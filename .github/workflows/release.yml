name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ -z "${version}" ]]; then
            echo "Tag version is empty" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: go run ./build.go

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          output="dist/synctool-${{ steps.version.outputs.tag }}.user.js"
          version='${{ steps.version.outputs.version }}'
          cp scripts/sync.user.js "$output"
          awk -v version="$version" '{
            if ($0 ~ /^\/\/ @version[[:space:]]+/) {
              print "// @version      " version
              next
            }
            print
          }' "$output" > "$output.tmp"
          mv "$output.tmp" "$output"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            bin/*
            dist/*.user.js
