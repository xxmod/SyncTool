name: Publish Userscript

on:
  push:
    branches: ["main", "master"]
    paths:
      - "scripts/sync.user.js"
      - ".github/workflows/userscript-pages.yml"
      - "pages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site content
        run: |
          set -eu
          mkdir -p dist
          cp scripts/sync.user.js dist/sync.user.js
          cp pages/index.html dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
